<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<title>ARO explore — demo(合成数据)</title>
<style>
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Helvetica,Arial,sans-serif;color:#0f172a;background:#f5f7fb;-webkit-font-smoothing:antialiased}
 code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
 header{padding:14px 22px;background:linear-gradient(180deg,#fff,#fbfcfe);border-bottom:1px solid #e8edf4;box-shadow:0 1px 3px rgba(15,23,42,.03)}
 h1{margin:0 0 4px;font-size:17px;font-weight:700;letter-spacing:-.01em}
 h1 .demo{font-size:11px;font-weight:600;color:#b45309;background:#fef3c7;border:1px solid #fde68a;padding:2px 8px;border-radius:999px;margin-left:8px;vertical-align:middle}
 .sub{color:#64748b;font-size:12px}
 .stats{display:flex;gap:7px;flex-wrap:wrap;font-size:12px;margin-top:8px}
 .stat{padding:4px 11px;border-radius:999px;background:#f1f5fb;border:1px solid #e7edf6;color:#475569}
 .stat b{color:#0f172a}
 main{display:flex;height:calc(100vh - 150px)}
 #left{flex:1.05;overflow:auto;padding:16px 20px;border-right:1px solid #e8edf4}
 #right{flex:1.15;overflow:auto;padding:18px 24px;background:#fff}
 .sech{font-size:12px;font-weight:700;color:#334155;margin:4px 0 8px;letter-spacing:.01em}
 /* coverage strip */
 .cov{margin-bottom:18px}
 .axis{display:flex;align-items:center;gap:8px;margin:5px 0}
 .axis .lbl{flex:0 0 64px;font-size:11px;color:#64748b;text-align:right}
 .cells{display:flex;gap:4px;flex-wrap:wrap}
 .cell{font-size:10.5px;padding:3px 8px;border-radius:7px;border:1px solid #e8edf4;display:flex;align-items:center;gap:5px;cursor:default}
 .cell .w{color:#16a34a;font-weight:700}
 .cell.under{border-style:dashed;color:#94a3b8;background:repeating-linear-gradient(45deg,#f1f5f9 0 4px,transparent 4px 8px)}
 .bar{height:5px;border-radius:3px;background:#dbeafe;margin-top:3px}
 /* tree */
 .node{border:1px solid #e8edf4;border-radius:9px;background:#fff;padding:9px 12px;margin:6px 0;cursor:pointer;box-shadow:0 1px 2px rgba(15,23,42,.04);transition:transform .12s,box-shadow .12s,border-color .12s}
 .node:hover{border-color:#c3ccda;box-shadow:0 4px 12px rgba(15,23,42,.09);transform:translateY(-1px)}
 .node.sel{outline:2px solid #2563eb;outline-offset:1px}
 .node .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
 .node .fn{font-weight:650;font-size:13px}
 .node .crate{font-size:10.5px;color:#64748b}
 .delta{font-weight:700;font-size:12px}
 .chip{font-size:10px;font-weight:600;padding:1px 7px;border-radius:999px;white-space:nowrap}
 .verdict{font-size:11px;font-weight:700}
 .risk{background:#fff7ed;color:#c2410c;border:1px solid #fdba74}
 .risk.high{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
 .cluster{border:1px dashed #cbd5e1;border-radius:9px;background:#f8fafc;padding:8px 12px;margin:6px 0;cursor:pointer;font-size:12px;color:#475569}
 .cluster:hover{background:#f1f5f9}
 /* audit trail */
 .h2{font-size:16px;font-weight:700;letter-spacing:-.01em;margin:0 0 3px}
 .h2 code{font-size:14px}
 .meta{color:#64748b;font-size:12px;margin-bottom:14px}
 .trail{position:relative;margin:10px 0 16px;padding-left:22px}
 .trail:before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:#e8edf4}
 .step{position:relative;margin:0 0 12px}
 .step .ic{position:absolute;left:-22px;top:1px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
 .step .st{font-size:12.5px;font-weight:700}
 .step .body{font-size:12px;color:#475569;line-height:1.55;margin-top:3px}
 .step .reasons{margin:5px 0 0}
 .step .reason{font-size:11.5px;padding:5px 9px;border-radius:7px;background:#f7f9fc;border:1px solid #eef2f8;margin:3px 0;line-height:1.5}
 .step .reason.hit{background:#fef2f2;border-color:#fecaca}
 .step .reason .rb{font-weight:700;color:#334155}
 .step .reason .ex{color:#b91c1c;font-weight:600}
 .ok{background:#16a34a} .warn{background:#ca8a04} .bad{background:#dc2626} .neutral{background:#94a3b8}
 .kv{display:grid;grid-template-columns:96px 1fr;gap:3px 10px;font-size:12px;margin:8px 0}
 .kv .k{color:#64748b}
 .diff{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.6;border:1px solid #e8edf4;border-radius:10px;overflow:auto;max-height:30vh;white-space:pre;margin-top:8px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
 .diff div{padding:1px 12px}
 .actions{display:flex;gap:8px;margin:16px 0 6px}
 .actions button{font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;border:1px solid}
 .b-merge{background:#dcfce7;border-color:#86efac;color:#166534}
 .b-reject{background:#fff;border-color:#cbd5e1;color:#475569}
 .b-ex{background:#faf5ff;border-color:#c4b5fd;color:#6d28d9}
 .hint{color:#94a3b8;font-size:13px;margin-top:40px;text-align:center}
 .note{font-size:11px;color:#94a3b8;margin-top:6px}
</style></head><body>
<header>
 <h1>ipa-stack-explore · explore 档<span class="demo">DEMO · 合成数据</span></h1>
 <div class="sub">无限尝试 → 两道 judge(确定性 + 语义评审)→ 把所有路线画成可回溯的树 · 人只在叶子拍板/加例子</div>
 <div class="stats" id="stats"></div>
</header>
<main>
 <div id="left"></div>
 <div id="right"><div class="hint">← 点左边任意候选,看它<b>完整的「为什么过/没过」链路</b>(可回溯到证据)</div></div>
</main>
<script>
/* ============ 合成数据 = explore 档的「数据契约」:跑真任务时这些字段都要记进 events.jsonl ============ */
const DATA = {
  mode:"explore", spec:"ipa-stack-explore",
  summary:{ generated:412, critic_rejected:188, deterministic_rejected:196, surfaced:28, big_wins:6, judge_hours:9.4 },
  // ★ 覆盖轴(explore/exploit「方向可达」):每格 = 尝试数(条宽)+ 赢(绿),虚线=被配额保护但还欠探索的方向
  coverage:[
    {axis:"crate", cells:[{n:"mega-evm",a:210,w:18},{n:"ipa-multipoint",a:90,w:6},{n:"banderwagon",a:60,w:3},{n:"salt(glue)",a:12,w:0,under:true}]},
    {axis:"手法", cells:[{n:"消冗余",a:120,w:12},{n:"缓存/记忆化",a:60,w:4},{n:"数据布局",a:70,w:5},{n:"消分配",a:40,w:3},{n:"批处理/融合",a:30,w:2},{n:"算法替换",a:50,w:1},{n:"分支重排",a:40,w:0,under:true}]},
    {axis:"热度档", cells:[{n:"top >5%",a:180,w:14},{n:"中 1-5%",a:140,w:8},{n:"尾 <1%",a:92,w:5}]},
    {axis:"风险档", cells:[{n:"字节相同",a:240,w:12},{n:"放宽·结构",a:130,w:9},{n:"跨 crate",a:42,w:6}]}
  ],
  // 排名靠前(值得人看的)
  top:[
    {
      id:"c1", fn:"commit_msm", crate:"ipa-multipoint", module:"crs", pct:11.2,
      technique:"缓存/记忆化", lens:"数据布局", regime:"relaxed", delta:-8.3,
      verdict:"accepted", risk:[{t:"跨 crate"},{t:"弱 oracle"}],
      hypothesis:"对 256-base 的 MSM 预算一张窗口表(window-NAF)并跨调用缓存,命中重复 base 时跳过点倍乘。",
      diff:[["@@ crs.rs: commit_lagrange_poly @@","h"],["-        for b in bases { acc += b * scalar }","-"],["+        let tbl = self.window_cache.get_or_build(bases);","+"],["+        acc = tbl.msm(scalars);","+"]],
      audit:{
        plan:{verdict:"pass", text:"窗口表 + 跨调用缓存;依赖 base 集合在一次承诺内不变(已 trace)。", reasons:[{rb:"不变量",txt:"base 集合在 commit 内只读 — 已确认无 mutator"}]},
        bench:{verdict:"pass", auto:true, proof:"自写微基准 commit_msm_bench:profile 显示 92% 时间在 mul_index ✓ 真打到目标", reasons:[{rb:"代表性",txt:"驱动到目标热帧,非 trivial"}]},
        code:{verdict:"pass-risk", reasons:[{rb:"跨 crate",txt:"改动落在 ipa-multipoint 而非 salt 本体 — 标 cross-crate",sev:"low"},{rb:"reward-hack 检",txt:"缓存键含全部 base,无法对单一 bench 输入作弊",sev:"none"}]},
        det:{gates:[{g:"guard",s:"ok"},{g:"build",s:"ok"},{g:"test",s:"ok",d:"1320/1320 通过"},{g:"differential",s:"ok-weak",d:"弱 oracle:无字节相同探针,仅测试套件证 → 标弱"},{g:"significance",s:"accepted",d:"Δ -8.3% CI[-9.1,-7.4] floor 0.38% scale 8"}], verdict:"accepted"},
        final:{verdict:"accepted", why:"真 -8.3%;缓存键防作弊;跨 crate + 弱 oracle → 你来定能否合"}
      }
    },
    {
      id:"c2", fn:"sstore", crate:"mega-evm", module:"evm", pct:9.2,
      technique:"消冗余", lens:"micro", regime:"relaxed", delta:-14.8,
      verdict:"accepted", risk:[{t:"近坏例子",cls:"high"},{t:"放宽"}],
      hypothesis:"消掉 SSTORE 链上第 2 次 inspect_storage:把已加载的 slot 传进 storage_gas_ext::sstore(保留分层,不删边界)。",
      diff:[["@@ instructions.rs @@","h"],["-        let r = storage_gas_ext::sstore(addr, key);","-"],["+        storage_gas_ext::sstore_with_slot(addr, key, &loaded_slot);","+"]],
      audit:{
        plan:{verdict:"pass", text:"传已加载值穿过现有接口(层保留),不溶解边界。", reasons:[{rb:"层保留",txt:"沿用 storage_gas_ext 接口,只多传一个已加载参数 — 不删层"}]},
        bench:{verdict:"pass", auto:false, proof:"用现成 evm_r3 探针;profile 命中 inspect_storage slot-present 热路径 ✓", reasons:[]},
        code:{verdict:"pass-risk", reasons:[{rb:"维护性",txt:"逼近 PR#313 的坏 pattern,但**保留了分层**(传值而非删层)→ 放行但标 risk",sev:"low",ex:"对照 PR#313"}]},
        det:{gates:[{g:"guard",s:"ok"},{g:"build",s:"ok"},{g:"test",s:"ok",d:"1240/1240 通过"},{g:"differential",s:"ok",d:"字节相同(随机输入指纹一致)"},{g:"significance",s:"accepted",d:"Δ -14.8% CI[-15.9,-13.6] floor 0.42% scale 8"}], verdict:"accepted"},
        final:{verdict:"accepted", why:"真 -14.8% 且字节相同;层保留变体,非 PR#313 的删层 → 比当年那版可接受"}
      }
    },
    {
      id:"c3", fn:"sstore", crate:"mega-evm", module:"evm", pct:9.2,
      technique:"消冗余", lens:"算法替换", regime:"cross-crate", delta:null,
      verdict:"critic-rejected", risk:[{t:"溶解分层",cls:"high"}],
      hypothesis:"内联并删除 storage_gas_ext::sstore,直接在 additional_limit_ext 里计费(省一次 inspect_storage)。",
      diff:[["@@ instructions.rs @@","h"],["-    storage_gas_ext::sstore(addr, key)   // 整层删除","-"],["+    // gas 计费内联进 additional_limit_ext::sstore","+"]],
      audit:{
        plan:{verdict:"reject", text:"内联+删层。", reasons:[{rb:"溶解分层",txt:"删掉 LOG/CALL/CREATE/SELFDESTRUCT 统一走的 storage_gas_ext 层,使 SSTORE 成唯一例外;约定表都得改去标注特例",sev:"high",ex:"完全命中 PR#313 被否的那条"}]},
        bench:null, code:null,
        det:null,  // ★ 关键:评审在判分前就否了 → 根本没进那条稀缺串行 bench(省吞吐)
        final:{verdict:"critic-rejected(判分前)", why:"命中已知坏例子 PR#313(溶解横切分层),不进判分。可在叶子翻案 / 这条理由可直接落成新反例。"}
      }
    }
  ],
  clusters:[
    {id:"k1", title:"分支重排 · 全 within-noise", size:23, note:"23 个候选:重排 host.rs 各处 && 守卫顺序,Δ 全在噪声内 → 折叠。手法『分支重排』本轮 0 赢(覆盖轴已标 under)。"},
    {id:"k2", title:"banderwagon 域运算 micro-tweak · 多数 verify-failed", size:17, note:"17 个候选:对 Montgomery 乘的 micro 改写,多因字节不同 verify-failed → 折叠。"}
  ]
};

/* ============ 渲染 ============ */
const VC={accepted:"#16a34a","critic-rejected":"#dc2626","verify-failed":"#dc2626",regressed:"#dc2626","within-noise":"#64748b"};
const vc=v=>VC[v]||"#64748b";
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>{const e=document.createElement('div');e.textContent=s==null?'':s;return e.innerHTML;};

(function stats(){
  const s=DATA.summary, box=document.getElementById('stats');
  [["生成",s.generated],["评审否",s.critic_rejected],["判分否",s.deterministic_rejected],["浮出(两道都过)",s.surfaced],["大赢",s.big_wins],["判分耗时",s.judge_hours+"h"]]
   .forEach(([k,v])=>{const c=el('span','stat',k+' <b>'+v+'</b>');box.appendChild(c);});
})();

function coverage(){
  const wrap=el('div','cov');
  wrap.appendChild(el('div','sech','① 覆盖轴 — 方向可达(每格:尝试条宽 + 绿=赢;虚线=配额保护、还欠探索)'));
  const maxA=Math.max(...DATA.coverage.flatMap(ax=>ax.cells.map(c=>c.a)));
  DATA.coverage.forEach(ax=>{
    const row=el('div','axis'); row.appendChild(el('div','lbl',ax.axis));
    const cells=el('div','cells');
    ax.cells.forEach(c=>{
      const cell=el('div','cell'+(c.under?' under':''));
      cell.innerHTML='<span>'+esc(c.n)+'</span> <span style="color:#94a3b8">'+c.a+'</span>'+(c.w?' <span class="w">✓'+c.w+'</span>':'');
      const bar=el('div','bar'); bar.style.width=(20+120*c.a/maxA)+'px'; bar.style.background=c.under?'#e2e8f0':'#bfdbfe';
      const box=el('div'); box.appendChild(cell); box.appendChild(bar); cells.appendChild(box);
    });
    row.appendChild(cells); wrap.appendChild(row);
  });
  return wrap;
}

function nodeRow(n){
  const row=el('div','node'); row.dataset.id=n.id;
  const top=el('div','top');
  top.appendChild(el('span','fn','<code>'+esc(n.fn)+'</code>'));
  top.appendChild(el('span','crate',n.crate+' · '+n.module+' · '+n.pct+'%'));
  if(n.delta!=null){const d=el('span','delta','快 '+(-n.delta).toFixed(1)+'%');d.style.color='#16a34a';top.appendChild(d);}
  const v=el('span','verdict'); v.style.color=vc(n.verdict); v.textContent=n.verdict; top.appendChild(v);
  (n.risk||[]).forEach(r=>{const c=el('span','chip risk'+(r.cls==='high'?' high':''),esc(r.t)); top.appendChild(c);});
  row.appendChild(top);
  row.onclick=()=>{document.querySelectorAll('.node.sel').forEach(e=>e.classList.remove('sel'));row.classList.add('sel');detail(n);};
  return row;
}

function left(){
  const L=document.getElementById('left');
  L.appendChild(coverage());
  L.appendChild(el('div','sech','② 值得你看的(大赢优先 · 标 risk)'));
  DATA.top.forEach(n=>L.appendChild(nodeRow(n)));
  L.appendChild(el('div','sech','③ 长尾(相似尝试聚类折叠)'));
  DATA.clusters.forEach(k=>{
    const c=el('div','cluster','▸ <b>'+esc(k.title)+'</b> · '+k.size+' 个 <span class="note" style="display:block">'+esc(k.note)+'</span>');
    L.appendChild(c);
  });
}

function step(icCls,icTxt,title,bodyHtml,reasons){
  const s=el('div','step');
  s.appendChild(el('div','ic '+icCls,icTxt));
  s.appendChild(el('div','st',title));
  if(bodyHtml) s.appendChild(el('div','body',bodyHtml));
  if(reasons&&reasons.length){
    const rs=el('div','reasons');
    reasons.forEach(r=>{ const hit=r.ex?' hit':''; rs.appendChild(el('div','reason'+hit,'<span class="rb">['+esc(r.rb)+']</span> '+esc(r.txt)+(r.ex?' <span class="ex">('+esc(r.ex)+')</span>':'')+(r.sev?' <span style="color:#94a3b8">· '+r.sev+'</span>':''))); });
    s.appendChild(rs);
  }
  return s;
}

function detail(n){
  const R=document.getElementById('right'); R.innerHTML='';
  R.appendChild(el('div','h2','<code>'+esc(n.fn)+'</code> <span style="color:'+vc(n.verdict)+'">· '+n.verdict+(n.delta!=null?' 快 '+(-n.delta).toFixed(1)+'%':'')+'</span>'));
  R.appendChild(el('div','meta',n.crate+' · '+n.module+' · 占 '+n.pct+'% · 手法:'+n.technique+' · lens:'+n.lens+' · 档:'+n.regime));
  R.appendChild(el('div','kv','<div class="k">改了什么</div><div>'+esc(n.hypothesis)+'</div>'));

  // ★ 审计链路:两道 judge 的「判定 + 理由」全程可回溯
  R.appendChild(el('div','sech','为什么 '+(n.verdict==='accepted'?'过了':'没过')+' — 完整链路(可回溯到证据)'));
  const a=n.audit, trail=el('div','trail');
  // 思路
  trail.appendChild(step(a.plan.verdict==='pass'?'ok':'bad', a.plan.verdict==='pass'?'✓':'✗', '思路/计划 → 评审:'+a.plan.verdict, esc(a.plan.text), a.plan.reasons));
  // bench
  if(a.bench) trail.appendChild(step(a.bench.verdict==='pass'?'ok':'bad', a.bench.verdict==='pass'?'✓':'✗', 'bench'+(a.bench.auto?'(自写)':'(现成)')+' → 评审:'+a.bench.verdict, esc(a.bench.proof), a.bench.reasons));
  else trail.appendChild(step('neutral','–','bench → 未到(思路已被否)',null,null));
  // 代码评审
  if(a.code) trail.appendChild(step(a.code.verdict==='pass'?'ok':(a.code.verdict==='pass-risk'?'warn':'bad'), a.code.verdict==='pass-risk'?'!':(a.code.verdict==='pass'?'✓':'✗'), '代码 → 评审:'+a.code.verdict, null, a.code.reasons));
  else trail.appendChild(step('neutral','–','代码评审 → 未到',null,null));
  // 确定性 judge
  if(a.det){
    const gnames={guard:'反作弊守卫',build:'编译',test:'测试',differential:'differential',significance:'显著性'};
    a.det.gates.forEach(g=>{const okk=g.s.indexOf('ok')===0||g.s==='accepted'; const wk=g.s.indexOf('weak')>=0; trail.appendChild(step(okk?(wk?'warn':'ok'):'bad', okk?(wk?'!':'✓'):'✗', '确定性·'+(gnames[g.g]||g.g)+':'+g.s, g.d?esc(g.d):null, null));});
  } else {
    trail.appendChild(step('neutral','–','确定性 judge → 未到(评审在判分前否决,省下那条稀缺串行 bench)',null,null));
  }
  // 最终
  trail.appendChild(step(n.verdict==='accepted'?'ok':'bad', n.verdict==='accepted'?'★':'✗', '最终判定:'+a.final.verdict, esc(a.final.why), null));
  R.appendChild(trail);

  // diff
  if(n.diff){ R.appendChild(el('div','sech','代码改动')); const d=el('div','diff'); n.diff.forEach(([t,k])=>{const c=k==='+'?'#166534':k==='-'?'#991b1b':k==='h'?'#0f172a':'#475569'; const bg=k==='+'?'#dcfce7':k==='-'?'#fee2e2':k==='h'?'#eef2f7':'transparent'; const row=el('div',null,esc(t));row.style.color=c;row.style.background=bg;d.appendChild(row);}); R.appendChild(d); }

  // 人的动作(叶子拍板/加例子)
  const act=el('div','actions');
  act.innerHTML='<button class="b-merge">采纳(进 baseline)</button><button class="b-reject">否决</button><button class="b-ex">否决 + 加为反例</button>';
  R.appendChild(act);
  R.appendChild(el('div','note','采纳/否决/加反例都不打断探索;"加反例"会落一条 example,后续相似坏改动被自动剪枝(减负担)。'));
}
left();
</script></body></html>
